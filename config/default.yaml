# Weekly US Stock screener configuration.
# Every threshold here is a research preference, not a trading instruction.

app:
  timezone: Asia/Shanghai
  market_timezone: America/New_York
  data_source: sample        # sample | fmp | auto
  output_dir: runs
  sample_data_dir: data/samples

universe:
  exchanges: [NYSE, NASDAQ, AMEX]   # AMEX == NYSE American
  include_adrs: false               # flip to true to let US-listed ADRs into the pool
  allowed_security_types: [common_stock]
  # Narrow the screen to index members (union). [] = full US market.
  # Supported: sp500, nasdaq100, dowjones.
  index_membership: [sp500, nasdaq100]

hard_filters:
  min_listing_years: 3
  min_market_cap: 500000000          # USD
  min_avg_dollar_volume: 5000000     # USD, trailing window
  liquidity_window_days: 60
  max_consecutive_loss_years: 3      # >= this many trailing loss years -> reject
  max_negative_fcf_years: 4          # >= this many trailing negative-FCF years -> reject
  min_financial_years: 5             # fail closed when fewer filed fiscal years are known
  min_interest_coverage: 2.0         # only enforced when net debt > 0
  max_net_debt_to_ebitda: 6.0
  max_share_dilution_cagr_3y: 0.07
  min_ocf_to_net_income: 0.5         # accounting-quality floor when net income > 0

normalization:
  lookback_years: 8
  min_years_for_normalization: 5
  default_tax_rate: 0.21
  min_tax_rate: 0.10
  max_tax_rate: 0.35
  max_filing_age_days: 150
  one_off_mad_threshold: 3.0
  one_off_corroboration_z: 1.5
  one_off_corroboration_ratio: 0.5
  one_off_mad_abs_floor: 0.01
  one_off_confidence_penalty: 0.15

wacc:
  equity_risk_premium: 0.05
  default_beta: 1.0
  fallback_risk_free: 0.042
  base_credit_spread: 0.015
  stressed_credit_spread: 0.04      # applied when interest coverage < 4
  min_wacc: 0.065
  max_wacc: 0.14

events:
  # Material-event gate: price shocks plus material SEC 8-K items. Flagged
  # names go to the event watchlist for manual re-underwriting instead of
  # being ranked on stale (pre-event) earning power.
  enabled: true
  weekly_drop_threshold: 0.25     # 1-week drop of 25%+
  drawdown_threshold: 0.40        # 40%+ below the 60-session high
  lookback_high_days: 60
  sec_8k_enabled: true
  sec_8k_lookback_days: 90
  material_8k_items: ["1.02", "2.06", "4.01", "4.02", "5.02"]

scenarios:
  horizon_years: 5
  exit_year: 3                       # secondary IRR horizon
  terminal_growth: 0.025
  probabilities:
    bear: 0.25
    base: 0.50
    bull: 0.25
  base_growth_cap: 0.25
  base_growth_floor: -0.05
  base_growth_spread: 0.04           # widened by cyclicality/dispersion, narrowed by moat
  bear_spread_skew: 1.25             # bear deviates further than bull
  bear_margin_haircut: 0.15          # fraction of normalized margin at risk when moat is weak
  bull_margin_uplift: 0.06
  max_reinvestment_rate: 1.20   # >1 lets capital hogs burn cash instead of growing for free
  price_anchor_growth: 0.05          # price path used to translate buyback spend into share count
  max_share_change_rate: 0.08
  min_share_change_rate: -0.05
  mature_sbc_intensity_default: 0.02   # fallback fade target when no peer median
  sbc_peer_min_count: 3                # min peers before an SBC median is trusted
  sbc_fade_speed:
    bear: 0.5                          # bear: SBC normalizes slowly
    base: 1.0                          # base: reaches the peer median by the horizon
    bull: 1.5                          # bull: SBC normalizes fastest

risk_preferences:
  # Investor risk preferences. These shape the Robust Ranking; they are NOT factor weights.
  hurdle_rate: 0.12
  downside_aversion: 1.0             # penalty per unit of worst-scenario stress
  ambiguity_aversion: 0.5            # penalty per unit of model uncertainty
  permanent_loss_penalty: 0.5        # penalty per unit of permanent-loss scenario weight
  cvar_alpha: 0.25                   # legacy key; 25/50/25 grid now reports worst-case stress
  permanent_loss_threshold: -0.30    # 5y total return below this counts as permanent loss
  uncertainty_per_missing_confidence: 0.03
  # hurdle_gap (default): confidence x max(median IRR - hurdle, 0)
  #   - downside_aversion x worst-scenario hurdle gap. A bear case earning 7%
  #   against a 12% hurdle is penalized; no double-counted penalties.
  # penalized_expected: E[IRR] - all three penalties (original spec form).
  # median_stress: Median IRR - downside_aversion x zero-anchored worst-case shortfall.
  formula: hurdle_gap

confidence:
  min_model_confidence: 0.2
  min_data_confidence: 0.2
  watchlist_data_confidence: 0.45    # below this the name goes to the watchlist, not the ranking
  watchlist_model_confidence: 0.35   # low model trust is a hard gate too

specialist_models:
  enabled: true
  min_years: 5
  lookback_years: 5
  model_confidence: 0.60             # v1 proxies lack regulatory capital / NOI detail
  data_confidence: 0.80
  terminal_growth: 0.025
  growth_floor: -0.02
  growth_cap: 0.06
  roe_bear_haircut: 0.30
  roe_bull_uplift: 0.15
  max_roe: 0.30
  reit_maintenance_capex_haircut: 0.15
  reit_growth_spread: 0.02

ranking:
  top_n: 20

report:
  feishu_top_n: 10

freshness:
  max_price_staleness_days: 3
  min_fresh_price_coverage: 0.8      # below this --strict-freshness exits with retry code 75

sec_reconciliation:
  enabled: true
  soft_divergence: 0.10              # FMP vs SEC 10-K: soft gap lowers data confidence
  hard_divergence: 0.25              # hard gap routes the name to the watchlist
  min_metrics: 2                     # need >= this many common metrics to judge
  confidence_penalty: 0.20           # data_confidence haircut on a soft divergence
  exempt_tickers: []                 # known, legitimate vendor/SEC tag differences
