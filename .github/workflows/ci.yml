name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run lint
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest

      - name: Offline end-to-end smoke run (sample provider)
        run: |
          weekly-us-stock run --provider sample --as-of 2026-01-09
          test -f runs/20260109/robust_ranking.csv
          test -f runs/20260109/upside_ranking.csv
          test -f runs/20260109/feishu_summary.md
          test -f runs/20260109/run_metadata.json
