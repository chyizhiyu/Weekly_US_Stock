name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run lint
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest

      - name: Offline end-to-end smoke run (sample provider)
        run: |
          weekly-us-stock run --provider sample --as-of 2026-01-09
          python -c "from pathlib import Path; required=['robust_ranking.csv','upside_ranking.csv','feishu_summary.md','run_metadata.json']; missing=[f for f in required if not (Path('runs/20260109') / f).is_file()]; assert not missing, f'missing artifacts: {missing}'"
